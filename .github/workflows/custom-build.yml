name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 1. 윈도우용 패키징 (최신 구조에서는 game-app 하위의 배포 태스크를 사용합니다)
      - name: Build Windows Executable
        run: |
          ./gradlew :game-app:packageWindows || \
          ./gradlew :game-app:bundleWindows || \
          ./gradlew :workflow:packageWindows
        continue-on-error: true

      # 2. 안드로이드용 APK 빌드 (안드로이드 모듈이 별도로 존재할 경우)
      - name: Build Android APK
        run: |
          ./gradlew :android:assembleDebug || \
          ./gradlew :game-android:assembleDebug || \
          ./gradlew assembleDebug
        continue-on-error: true

      # 3. 결과물 찾기 및 업로드 (모든 .zip과 .apk 수집)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Final-Build
          path: |
            **/*.zip
            **/*.apk
          if-no-files-found: error
