name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 1. 윈도우용 실행 파일 빌드 (가장 확률 높은 태스크들 실행)
      - name: Build Windows
        run: |
          ./gradlew :triplea:packageWindows || \
          ./gradlew :workflow:packageWindows || \
          ./gradlew packageWindows || \
          ./gradlew :triplea:packagePlatforms -Pplatforms=windows || \
          echo "Windows build failed but moving on..."

      # 2. 안드로이드용 APK 빌드
      - name: Build Android
        run: |
          ./gradlew :android:assembleDebug || \
          ./gradlew assembleDebug || \
          echo "Android build failed but moving on..."

      # 3. [중요] 생성된 파일 찾기 (디버깅용)
      # 실제로 어떤 파일들이 만들어졌는지 로그에 찍어서 경로를 확인합니다.
      - name: Locate Files
        run: |
          find . -name "*.apk"
          find . -name "*.zip"

      # 4. 결과물 업로드 (경로를 극도로 유연하게 설정)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Build-Files
          # 모든 하위 폴더에서 .apk와 .zip을 찾아서 업로드
          path: |
            **/*.apk
            **/*.zip
          # 파일이 없어도 에러를 내지 않도록 설정 (테스트용)
          if-no-files-found: warn
