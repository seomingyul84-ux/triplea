name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 1. 윈도우/전체 플랫폼 패키징 (TripleA 정식 태스크)
      - name: Build Game Installers
        run: |
          ./gradlew :triplea:packagePlatforms -Pplatforms=windows || \
          ./gradlew :workflow:packageWindows || \
          ./gradlew packageWindows
        continue-on-error: true

      # 2. 범용 실행 파일 (JAR) 생성 - 만약 EXE가 실패하면 이거라도 써야 합니다.
      - name: Build Game JAR
        run: ./gradlew :game-app:jar || ./gradlew jar
        continue-on-error: true

      # 3. 안드로이드 빌드 (모듈이 존재하는지 확인 후 실행)
      - name: Build Android
        run: |
          if [ -d "android" ]; then
            ./gradlew :android:assembleDebug
          else
            echo "Android module not found in this repository."
          fi
        continue-on-error: true

      # 4. 결과물 찾기 및 업로드 (가장 중요한 단계)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Game-Files
          path: |
            **/build/deployment/bundles/*.zip
            **/build/libs/*.jar
            **/build/outputs/apk/debug/*.apk
            **/build/distributions/*.zip
          if-no-files-found: error
