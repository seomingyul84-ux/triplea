name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: annotations/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # [중요] 사용 가능한 모든 프로젝트와 태스크 목록을 로그에 남깁니다 (디버깅용)
      - name: List Gradle Projects
        run: ./gradlew projects

      # 1. 윈도우 패키징 (경로가 불확실할 때 가장 안전한 호출 방식)
      # :workflow 대신 프로젝트 전체에서 packageWindows를 찾도록 실행합니다.
      - name: Build Windows Executable
        run: ./gradlew packageWindows || ./gradlew :triplea:packageWindows || ./gradlew :github:workflow:packageWindows

      # 2. 안드로이드 빌드
      - name: Build Android APK
        run: ./gradlew assembleDebug

      # 3. 결과물 업로드 (Windows)
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Windows-Build
          path: "**/build/deployment/bundles/*.zip"

      # 4. 결과물 업로드 (Android)
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Android-APK
          path: "**/build/outputs/apk/debug/*.apk"
