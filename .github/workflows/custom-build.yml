name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 1. 윈도우 빌드 (clean 추가로 강제 빌드 유도)
      - name: Build Windows
        run: |
          ./gradlew clean :triplea:packageWindows || \
          ./gradlew :workflow:packageWindows || \
          ./gradlew packageWindows
        continue-on-error: true

      # 2. 안드로이드 빌드 (강제 컴파일)
      - name: Build Android
        run: |
          ./gradlew :android:assembleDebug --stacktrace
        continue-on-error: true

      # 3. 파일이 진짜 어디 있는지 하이라이트 해서 보여줘!
      - name: Search for Results
        run: |
          echo "--- Looking for APKs ---"
          find . -name "*.apk"
          echo "--- Looking for ZIPs ---"
          find . -name "*.zip"

      # 4. 결과물 업로드 (필터링 없이 싹 다 긁어오기)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Force-Build
          path: |
            **/*.apk
            **/*.zip
          if-no-files-found: error # 파일 없으면 이번엔 에러 내서 알려줘!
