name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch: # 이 구문이 있어야 'Run workflow' 버튼이 생깁니다.

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 # TripleA 버전에 따라 17이 필요할 수도 있습니다.
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. 윈도우용 빌드 (Zip 형태)
      - name: Build Windows Executable
        run: ./gradlew :workflow:packageWindows

      # 2. 안드로이드용 빌드 (APK)
      - name: Build Android APK
        run: ./gradlew :android:assembleDebug

      # 3. 결과물 업로드 (Windows)
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Windows-Build
          path: build/deployment/bundles/*.zip

      # 4. 결과물 업로드 (Android)
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Android-APK
          path: android/build/outputs/apk/debug/*.apk
