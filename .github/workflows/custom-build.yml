name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # 'annotations'에서 'actions'로 수정 완료!
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. 윈도우용 실행 파일 빌드
      # TripleA는 보통 :fullZip 또는 packageWindows 태스크를 사용합니다.
      - name: Build Windows Executable
        run: ./gradlew packageWindows || ./gradlew :triplea:packageWindows || ./gradlew :github:workflow:packageWindows

      # 2. 안드로이드용 APK 빌드
      - name: Build Android APK
        run: ./gradlew assembleDebug

      # 3. 결과물 업로드 (Windows)
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Windows-Build
          path: "**/build/deployment/bundles/*.zip"

      # 4. 결과물 업로드 (Android)
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Android-APK
          path: "**/build/outputs/apk/debug/*.apk"
