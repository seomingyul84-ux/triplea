name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 1. 가용한 모든 프로젝트/태스크 출력 (실패 시 원인 파악용)
      - name: Debug Structure
        run: |
          ./gradlew projects
          ./gradlew tasks --all | grep -E "packageWindows|assembleDebug"

      # 2. 윈도우 빌드 (가장 확률 높은 명령어 2개를 순차 시도)
      - name: Build Windows
        run: |
          ./gradlew packageWindows || ./gradlew :workflow:packageWindows || echo "Windows build failed"
        continue-on-error: true

      # 3. 안드로이드 빌드
      - name: Build Android
        run: |
          ./gradlew assembleDebug || ./gradlew :android:assembleDebug || echo "Android build failed"
        continue-on-error: true

      # 4. 결과물 업로드 (위치가 어디든 .zip과 .apk면 다 가져옴)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Manual-Build
          path: |
            **/*.zip
            **/*.apk
          if-no-files-found: error
