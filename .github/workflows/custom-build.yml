name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 1. 윈도우용 빌드 (TripleA의 정식 태스크는 :workflow:packageWindows 입니다)
      - name: Build Windows Executable
        run: ./gradlew :workflow:packageWindows --no-daemon

      # 2. 안드로이드용 APK 빌드 (Debug 모드)
      - name: Build Android APK
        run: ./gradlew :android:assembleDebug --no-daemon

      # 3. 결과물 수집 및 업로드
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Game-Files
          path: |
            workflow/build/deployment/bundles/*.zip
            android/build/outputs/apk/debug/*.apk
          if-no-files-found: error
