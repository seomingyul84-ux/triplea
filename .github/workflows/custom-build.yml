name: Custom Manual Build (Windows & Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 1. 윈도우용 빌드 (workflow 프로젝트의 패키징 태스크 실행)
      # TripleA는 프로젝트 루트 하위에 :workflow가 있습니다.
      - name: Build Windows Executable
        run: ./gradlew :workflow:packageWindows --stacktrace

      # 2. 안드로이드용 APK 빌드
      - name: Build Android APK
        run: ./gradlew :android:assembleDebug --stacktrace

      # 3. 결과물 업로드 (생성 위치를 더 넓게 잡았습니다)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TripleA-Game-Files
          path: |
            **/build/deployment/bundles/*.zip
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: error
